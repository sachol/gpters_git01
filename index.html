<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개 - 노제승</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', '맑은 고딕', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* ── 파티클 배경 캔버스 ── */
        #particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ── 카드 ── */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 50px 40px;
            max-width: 580px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(40px) scale(0.95);
            animation: cardAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.4), rgba(118, 75, 162, 0.4), rgba(102, 126, 234, 0.1));
            z-index: -1;
            opacity: 0;
            animation: glowPulse 3s ease-in-out 1s infinite;
        }

        @keyframes cardAppear {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* ── 아바타 ── */
        .avatar-wrapper {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 28px;
        }

        .avatar-ring {
            position: absolute;
            top: -4px; left: -4px;
            width: 128px; height: 128px;
            border-radius: 50%;
            background: conic-gradient(#667eea, #764ba2, #f093fb, #667eea);
            animation: ringRotate 4s linear infinite;
        }

        .avatar {
            position: relative;
            width: 120px; height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            color: white;
            font-weight: bold;
            z-index: 1;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
        }

        @keyframes ringRotate {
            to { transform: rotate(360deg); }
        }

        /* ── 텍스트 순차 등장 ── */
        .fade-up {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s ease forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .name {
            font-size: 30px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
            animation-delay: 0.6s;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }

        .title {
            font-size: 15px;
            color: #a78bfa;
            font-weight: 600;
            margin-bottom: 28px;
            line-height: 1.6;
            animation-delay: 0.8s;
        }

        .divider {
            width: 60px; height: 3px;
            background: linear-gradient(90deg, #667eea, #f093fb, #764ba2);
            margin: 0 auto 28px;
            border-radius: 2px;
            animation-delay: 0.9s;
            position: relative;
            overflow: hidden;
        }

        .divider::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: shimmer 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .bio {
            font-size: 15px;
            line-height: 2.0;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 36px;
            animation-delay: 1.0s;
            text-align: left;
            padding: 0 10px;
        }

        .bio .intro {
            text-align: center;
            font-size: 18px;
            margin-bottom: 16px;
        }

        .bio .desc {
            margin-bottom: 12px;
        }

        .bio .emoji-label {
            margin-right: 4px;
        }

        /* ── 연락처 버튼 ── */
        .contact {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            animation-delay: 1.2s;
        }

        .contact a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .contact a::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s ease;
        }

        .contact a:hover::before {
            left: 100%;
        }

        .contact a:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .contact a svg {
            width: 16px; height: 16px;
            fill: currentColor;
        }

        /* ── 푸터 ── */
        .footer {
            margin-top: 36px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            animation-delay: 1.4s;
            letter-spacing: 0.5px;
        }

        /* ── 키워드 태그 ── */
        .tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 32px;
            animation-delay: 1.1s;
        }

        .tag {
            padding: 6px 16px;
            background: rgba(102, 126, 234, 0.15);
            color: #a78bfa;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid rgba(102, 126, 234, 0.2);
            transition: all 0.3s ease;
        }

        .tag:hover {
            background: rgba(102, 126, 234, 0.3);
            transform: scale(1.05);
        }

        /* ── 반응형 ── */
        @media (max-width: 480px) {
            .card { padding: 36px 24px; }
            .name { font-size: 24px; }
            .title { font-size: 14px; }
            .bio { font-size: 14px; }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <div class="card">
        <div class="avatar-wrapper fade-up" style="animation-delay: 0.5s;">
            <div class="avatar-ring"></div>
            <div class="avatar">노</div>
        </div>

        <h1 class="name fade-up">노제승 (도시아재)</h1>

        <p class="title fade-up">🏠 공인중개사 · ⚖️ 법원경매 컨설턴트<br>📊 부동산투자 컨설턴트 · 🤖 공인중개사를 위한 AI 강사</p>

        <div class="divider fade-up"></div>

        <div class="bio fade-up">
            <p class="intro">👋 안녕하세요! 노제승입니다.</p>
            <p class="desc"><span class="emoji-label">🧠</span>AI를 활용한 부동산 중개 역량 강화와 실무 자동화를 연구하고 교육합니다.</p>
            <p class="desc"><span class="emoji-label">🎓</span>공인중개사를 위한 콘텐츠 개발과 강의를 진행하고 있습니다.</p>
            <p class="desc"><span class="emoji-label">🍵</span>보이차를 통한 생활 루틴 개선에 대한 책을 집필 중입니다.</p>
        </div>

        <div class="tags fade-up">
            <span class="tag">🤖 #부동산AI</span>
            <span class="tag">⚖️ #법원경매</span>
            <span class="tag">🏠 #공인중개사</span>
            <span class="tag">🍵 #보이차</span>
        </div>

        <div class="contact fade-up">
            <a href="mailto:cachol.cap@gmail.com">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                이메일
            </a>
        </div>

        <p class="footer fade-up">⚡ AI와 부동산을 연결하는 실전 전문가</p>
    </div>

    <script>
        // ── 파티클 배경 애니메이션 ──
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        const particles = [];
        const PARTICLE_COUNT = 60;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 0.5,
                speedX: (Math.random() - 0.5) * 0.5,
                speedY: (Math.random() - 0.5) * 0.5,
                opacity: Math.random() * 0.5 + 0.1
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 파티클 그리기
            particles.forEach(function(p) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(167, 139, 250, ' + p.opacity + ')';
                ctx.fill();

                p.x += p.speedX;
                p.y += p.speedY;

                // 화면 밖으로 나가면 반대편에서 등장
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
            });

            // 가까운 파티클끼리 선 연결
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    var dx = particles[i].x - particles[j].x;
                    var dy = particles[i].y - particles[j].y;
                    var dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = 'rgba(102, 126, 234, ' + (0.1 * (1 - dist / 150)) + ')';
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(drawParticles);
        }

        drawParticles();

        // ── 마우스 인터랙션: 마우스 근처 파티클이 반응 ──
        document.addEventListener('mousemove', function(e) {
            particles.forEach(function(p) {
                var dx = e.clientX - p.x;
                var dy = e.clientY - p.y;
                var dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 120) {
                    p.x -= dx * 0.02;
                    p.y -= dy * 0.02;
                }
            });
        });
    </script>
</body>
</html>
